name: Build new CV version

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cv-build
  cancel-in-progress: false

jobs:
  build-cv:
    name: Build CV
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: cv.tex

      - name: Verify PDF was created
        run: |
          if [ ! -f cv.pdf ]; then
            echo "Error: cv.pdf was not generated"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: CV-PDF-${{ github.run_number }}
          path: cv.pdf
          retention-days: 30

      - name: Commit and push PDF
        run: |
          git config user.email "me@juanvaldivia.dev"
          git config user.name "jsmvaldivia"
          git add cv.pdf

          if git diff --staged --quiet; then
            echo "No changes to commit - PDF unchanged"
            exit 0
          fi

          git commit -m "New CV version"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          
         
